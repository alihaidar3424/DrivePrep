<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="RaahPass">
  <defs>
    <linearGradient id="rp-bg" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#064E3B"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="rp-road" x1="256" y1="360" x2="256" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>
    <filter id="rp-shadow" x="280" y="88" width="160" height="160" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#022c22" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#rp-bg)"/>
  <!-- Road perspective -->
  <path d="M176 372 L228 196 Q256 168 284 196 L336 372 Z" fill="url(#rp-road)" fill-opacity="0.18"/>
  <path d="M208 372 L244 220 Q256 204 268 220 L304 372" stroke="url(#rp-road)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M248 372 L256 248 L264 372" stroke="#ffffff" stroke-width="5" stroke-dasharray="14 16" stroke-linecap="round" opacity="0.85"/>
  <!-- Curved path / raah -->
  <path d="M148 320 C148 220 210 156 256 132 C302 156 364 220 364 320" stroke="#ffffff" stroke-width="16" stroke-linecap="round" opacity="0.35"/>
  <!-- Pass check badge -->
  <g filter="url(#rp-shadow)">
    <circle cx="348" cy="148" r="58" fill="#FBBF24"/>
    <path d="M318 148 L338 168 L382 124" stroke="#065F46" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
